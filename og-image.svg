    <path d="M9.40395 31.4048C11.1783 29.0871 16.5919 33.35 16.4682 30.3639C16.3017 26.342 20.8653 33.818 22.4741 30.8636C23.517 28.9483 22.242 25.2604 24.1092 25.1831C25.9764 25.1057 27.9827 28.3893 28.1219 31.7502" stroke="white" stroke-width="2.24" stroke-linecap="round" fill="none"/>
  </g>

  <!-- "Quill" wordmark -->
  <text x="188" y="308" font-family="-apple-system, SF Pro Display, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="96" font-weight="800" letter-spacing="-3" fill="white">Quill</text>

  <!-- Tagline with gradient on last 4 words -->
  <text x="100" y="382" font-family="-apple-system, SF Pro Text, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="36" font-weight="500" fill="#9ca3af">AI actions, right</text>
  <text x="100" y="430" font-family="-apple-system, SF Pro Text, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="36" font-weight="500" fill="#9ca3af">where you need them.</text>

  <!-- Mini action menu card (right side) -->
  <rect x="720" y="160" width="360" height="310" rx="20" fill="#1b1b24" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Menu items -->
  <!-- Fix the text -->
  <rect x="737" y="178" width="326" height="44" rx="10" fill="rgba(52,211,153,0.08)"/>
  <rect x="750" y="187" width="26" height="26" rx="7" fill="rgba(52,211,153,0.15)"/>
  <circle cx="763" cy="200" r="6" fill="#34d399"/>
  <text x="786" y="205" font-family="-apple-system, SF Pro Text, sans-serif" font-size="15" font-weight="500" fill="#e8e8f0">Fix the text</text>

  <!-- Make it formal -->
  <rect x="750" y="233" width="26" height="26" rx="7" fill="rgba(251,191,36,0.12)"/>
  <circle cx="763" cy="246" r="6" fill="#fbbf24"/>
  <text x="786" y="251" font-family="-apple-system, SF Pro Text, sans-serif" font-size="15" font-weight="500" fill="rgba(232,232,240,0.75)">Make it formal</text>

  <!-- Translate -->
  <rect x="750" y="269" width="26" height="26" rx="7" fill="rgba(167,139,250,0.15)"/>
  <circle cx="763" cy="282" r="6" fill="#a78bfa"/>
  <text x="786" y="287" font-family="-apple-system, SF Pro Text, sans-serif" font-size="15" font-weight="500" fill="rgba(232,232,240,0.75)">Translate</text>

  <!-- Summarize -->
  <rect x="750" y="305" width="26" height="26" rx="7" fill="rgba(96,165,250,0.15)"/>
  <circle cx="763" cy="318" r="6" fill="#60a5fa"/>
  <text x="786" y="323" font-family="-apple-system, SF Pro Text, sans-serif" font-size="15" font-weight="500" fill="rgba(232,232,240,0.75)">Summarize</text>

  <!-- Divider -->
  <line x1="750" y1="345" x2="1063" y2="345" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Custom prompt input -->
  <rect x="750" y="356" width="312" height="36" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <text x="763" y="379" font-family="-apple-system, SF Pro Text, sans-serif" font-size="13" fill="rgba(255,255,255,0.28)">e.g. Shorten this</text>

  <!-- Hotkey badge -->
