  <g transform="translate(100,259) scale(2)">
    <path d="M4.32931 31.6789C5.09735 28.7446 6.10181 25.8671 8.40875 21.6093M8.40875 21.6093C12.9072 13.3066 18.7038 6.45709 29.6914 3.23457C30.1403 3.10293 30.5947 3.42625 30.6114 3.89368C31.0531 16.2473 19.8997 20.7027 8.40875 21.6093Z" stroke="white" stroke-width="2.24" stroke-linecap="round" fill="none"/>
    <path d="M19.8012 12.4725C21.8632 12.271 24.5561 12.2735 27.6994 12.8208C27.2071 13.5287 26.6875 14.1648 26.3207 14.5691C24.6958 13.7559 22.1193 13.0023 19.8012 12.4725Z" fill="white" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
