  <text x="739" y="510" font-family="SF Mono, ui-monospace, monospace" font-size="14" fill="#f0f0f6">⌃⌥A</text>

  <!-- Open source badge -->
  <rect x="100" y="490" width="138" height="30" rx="15" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="122" y="510" font-family="-apple-system, SF Pro Text, sans-serif" font-size="13" font-weight="600" fill="#10b981">Open source</text>

  <!-- macOS badge -->
